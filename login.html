<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — La Rose</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand">la Rose</div>
      <h1>Sign In</h1>
      <p>Enter your username and password to continue.</p>
      <input id="login-username" class="demo-input" placeholder="Username" autocomplete="username">
      <input id="login-password" type="password" class="demo-input" placeholder="Password" autocomplete="current-password">
      <button id="login-submit" class="primary">Login</button>
      <div class="login-hint">Default account: <strong>admin</strong> / <strong>admin123</strong></div>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
