<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payroll — La Rose</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">hh</div>
      <div class="business-card">
        <label>BUSINESS</label>
        <select id="branch-select" title="Select business branch">
          <option>hh</option>
        </select>
      </div>
      <nav class="apps-list">
        <a class="app-btn" href="index.html">Dashboard</a>
        <a class="app-btn" href="inventory.html">Inventory</a>
        <a class="app-btn" href="pos.html">POS</a>
        <a class="app-btn" href="sales.html">Sales</a>
        <a class="app-btn" href="purchases.html">Purchases</a>
        <a class="app-btn" href="accounting.html">Accounting</a>
        <a class="app-btn" href="reports.html">Reports</a>
        <a class="app-btn" href="users.html">Users</a>
        <a class="app-btn active" href="payroll.html">Payroll</a>
        <a class="app-btn" href="truck.html">Truck</a>
        <a class="app-btn" href="settings.html">Settings</a>
        <a class="app-btn" href="apps.html">Installed Apps</a>
      </nav>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="left">Payroll</div>
        <div class="right">Staff pay</div>
      </header>

      <section class="grid">
        <article class="card">
          <h3>Quick Payroll</h3>
          <div class="box">
            <input placeholder="Staff name" class="demo-input" id="payroll-name">
            <input placeholder="Amount" class="demo-input" id="payroll-amount">
            <button class="primary" id="payroll-add">Add Payroll Entry</button>
            <div class="list" id="payroll-list"></div>
          </div>
        </article>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
