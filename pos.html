<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>POS — La Rose</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">hh</div>
      <div class="business-card">
        <label>BUSINESS</label>
        <select id="branch-select" title="Select business branch">
          <option>hh</option>
        </select>
      </div>
      <nav class="apps-list">
        <a class="app-btn" href="index.html">Dashboard</a>
        <a class="app-btn" href="inventory.html">Inventory</a>
        <a class="app-btn active" href="pos.html">POS</a>
        <a class="app-btn" href="sales.html">Sales</a>
        <a class="app-btn" href="purchases.html">Purchases</a>
        <a class="app-btn" href="accounting.html">Accounting</a>
        <a class="app-btn" href="reports.html">Reports</a>
        <a class="app-btn" href="users.html">Users</a>
        <a class="app-btn" href="payroll.html">Payroll</a>
        <a class="app-btn" href="truck.html">Truck</a>
        <a class="app-btn" href="settings.html">Settings</a>
        <a class="app-btn" href="apps.html">Installed Apps</a>
      </nav>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <div class="left">POS</div>
        <div class="right">Create orders</div>
      </header>

      <section class="grid">
        <article class="card">
          <h3>Current Order</h3>
          <div class="box">
            <div class="order-table">
              <table>
                <thead><tr><th>ID</th><th>Item</th><th>QTY</th><th>Price</th></tr></thead>
                <tbody id="pos-order-body">
                  <tr><td>1</td><td>Search item</td><td>0</td><td>0</td></tr>
                  <tr><td>2</td><td>Search item</td><td>0</td><td>0</td></tr>
                </tbody>
              </table>
            </div>
            <div class="row-flex">
              <input id="pos-name" class="demo-input" placeholder="Item name">
              <input id="pos-qty" class="demo-input" placeholder="QTY">
              <input id="pos-price" class="demo-input" placeholder="Price">
              <button class="primary" id="pos-add">Add</button>
            </div>
            <div class="big-total" id="pos-total">UGX 0</div>
            <button class="primary" id="pos-submit">Submit Order To Cashier</button>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
